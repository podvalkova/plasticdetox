<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Kitchen Appliances — Email Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d6d3d1; display: flex; justify-content: center; padding: 2rem; font-family: 'Inter', -apple-system, sans-serif; }
    .pin {
      width: 1040px;
      height: 540px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
    }
    .pin > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to right,
        rgba(250, 250, 249, 0.95) 0%,
        rgba(250, 250, 249, 0.80) 45%,
        rgba(250, 250, 249, 0) 70%
      );
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 56px;
    }
    .headline-tag {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #7c3aed;
      background: #ede9fe;
      padding: 7px 18px;
      border-radius: 100px;
      margin-bottom: 16px;
      align-self: flex-start;
    }
    h1 {
      font-size: 38px;
      font-weight: 900;
      color: #1c1917;
      line-height: 1.15;
      letter-spacing: -0.03em;
      max-width: 480px;
    }
    .subtitle {
      font-size: 16px;
      font-weight: 500;
      color: #57534e;
      margin-top: 14px;
      max-width: 420px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="pin">
    <img src="kitchen appliences.png" alt="Pencil sketch of kitchen appliances ranked by toxicity">
    <div class="overlay">
      <div class="headline-tag">Kitchen Guide</div>
      <h1>Kitchen Appliances Ranked by Toxicity</h1>
      <div class="subtitle">From air fryers shedding PFAS to safe stainless picks. Science backed ranking with specific non toxic swaps.</div>
    </div>
  </div>
</body>
</html>
