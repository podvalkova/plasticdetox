<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Kitchen Appliances — Email Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d6d3d1; display: flex; justify-content: center; padding: 2rem; font-family: 'Inter', -apple-system, sans-serif; }
    .pin {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
    }
    .pin > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .top-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 56px 48px 100px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0.97) 0%,
        rgba(250, 250, 249, 0.90) 50%,
        rgba(250, 250, 249, 0) 100%
      );
      text-align: center;
    }
    .headline-tag {
      display: inline-block;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #7c3aed;
      background: #ede9fe;
      padding: 10px 26px;
      border-radius: 100px;
      margin-bottom: 22px;
    }
    .top-overlay h1 {
      font-size: 58px;
      font-weight: 900;
      color: #1c1917;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0) 0%,
        rgba(250, 250, 249, 0.9) 50%,
        rgba(250, 250, 249, 1) 100%
      );
    }
    .footer-stat { font-size: 17px; font-weight: 600; color: #78716c; }
    .footer-url { font-size: 19px; font-weight: 800; color: #7c3aed; }
  </style>
</head>
<body>
  <div class="pin">
    <img src="kitchen appliences.png" alt="Pencil sketch of kitchen appliances ranked by toxicity">
    <div class="top-overlay">
      <h1>Kitchen Appliances<br>Ranked by Toxicity</h1>
    </div>
    <div class="footer">
      <span class="footer-stat">From air fryers shedding PFAS to safe stainless picks.</span>
      <span class="footer-url">plasticdetox.org</span>
    </div>
  </div>
</body>
</html>
