<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Supplements Article Hero</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d6d3d1; display: flex; justify-content: center; padding: 2rem; font-family: 'Inter', -apple-system, sans-serif; }
    .pin {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background: #fafaf9;
    }
    .pin > svg.bg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .top-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 64px 50px 110px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0.97) 0%,
        rgba(250, 250, 249, 0.90) 55%,
        rgba(250, 250, 249, 0) 100%
      );
      text-align: center;
    }
    .headline-tag {
      display: inline-block;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #fff;
      background: #7c3aed;
      padding: 16px 36px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .top-overlay h1 {
      font-size: 92px;
      font-weight: 900;
      color: #1c1917;
      line-height: 1.0;
      letter-spacing: -0.035em;
    }
    .top-overlay h1 .accent { color: #7c3aed; font-style: italic; }
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 48px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0) 0%,
        rgba(250, 250, 249, 0.92) 55%,
        rgba(250, 250, 249, 1) 100%
      );
    }
    .footer-stat { font-size: 32px; font-weight: 700; color: #44403c; }
    .footer-url { font-size: 32px; font-weight: 900; color: #7c3aed; }
  </style>
</head>
<body>
  <div class="pin">
    <svg class="bg" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <filter id="pencil" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
        </filter>
        <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="6" stroke="#1c1917" stroke-width="0.6" opacity="0.35"/>
        </pattern>
        <pattern id="hatchLight" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#1c1917" stroke-width="0.4" opacity="0.18"/>
        </pattern>
        <pattern id="dotsPowder" patternUnits="userSpaceOnUse" width="7" height="7">
          <circle cx="2" cy="2" r="0.9" fill="#1c1917" opacity="0.55"/>
          <circle cx="5" cy="5" r="0.6" fill="#1c1917" opacity="0.4"/>
        </pattern>
      </defs>

      <!-- background paper texture -->
      <rect width="1080" height="1350" fill="#fafaf9"/>
      <rect width="1080" height="1350" fill="url(#hatchLight)" opacity="0.4"/>

      <!-- Counter / shelf line -->
      <g stroke="#1c1917" stroke-width="2.2" fill="none" filter="url(#pencil)">
        <line x1="60" y1="1080" x2="1020" y2="1080"/>
        <line x1="80" y1="1086" x2="1000" y2="1086" opacity="0.5"/>
      </g>

      <!-- LEFT: Glass dropper bottle (vitamin D) -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2.4" fill="none">
        <!-- Cap -->
        <rect x="180" y="540" width="120" height="60" rx="6"/>
        <!-- Neck -->
        <rect x="200" y="600" width="80" height="30"/>
        <!-- Bottle body -->
        <path d="M 170 630 L 170 1080 L 310 1080 L 310 630 Z"/>
        <!-- Bottle highlight -->
        <line x1="200" y1="650" x2="200" y2="1060" opacity="0.5"/>
        <!-- Liquid level -->
        <line x1="170" y1="780" x2="310" y2="780"/>
        <!-- Dropper inside -->
        <line x1="240" y1="600" x2="240" y2="900" stroke-width="1.6"/>
        <!-- Tonal fill -->
      </g>
      <rect x="170" y="780" width="140" height="300" fill="url(#hatch)" filter="url(#pencil)"/>

      <!-- LEFT: Liquid drop falling -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2" fill="none">
        <path d="M 240 945 Q 235 955 240 970 Q 245 955 240 945 Z"/>
        <line x1="220" y1="930" x2="260" y2="930" stroke-width="1.2" opacity="0.5"/>
      </g>

      <!-- CENTER LEFT: Capsules scattered -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2.2" fill="#fafaf9">
        <!-- capsule 1 -->
        <g transform="translate(360,1000) rotate(-18)">
          <rect x="0" y="0" width="110" height="40" rx="20"/>
          <line x1="55" y1="2" x2="55" y2="38" stroke-width="2"/>
          <ellipse cx="20" cy="20" rx="6" ry="3" fill="none" opacity="0.4" stroke-width="1"/>
        </g>
        <!-- capsule 2 -->
        <g transform="translate(420,960) rotate(28)">
          <rect x="0" y="0" width="100" height="36" rx="18"/>
          <line x1="50" y1="2" x2="50" y2="34" stroke-width="2"/>
        </g>
        <!-- capsule 3 -->
        <g transform="translate(380,920) rotate(-8)">
          <rect x="0" y="0" width="120" height="42" rx="21"/>
          <line x1="60" y1="2" x2="60" y2="40" stroke-width="2"/>
          <ellipse cx="22" cy="21" rx="7" ry="3" fill="none" opacity="0.4" stroke-width="1"/>
        </g>
      </g>
      <!-- shading on capsule right halves -->
      <g filter="url(#pencil)" opacity="0.6">
        <path d="M 415 1006 L 415 1042 L 470 1042 L 470 1006 Z" fill="url(#hatch)" transform="rotate(-18,460,1024)"/>
      </g>

      <!-- CENTER: Powder jar (creatine / magnesium) -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2.4" fill="none">
        <!-- Lid -->
        <rect x="500" y="700" width="220" height="48" rx="6"/>
        <line x1="500" y1="724" x2="720" y2="724" opacity="0.4"/>
        <!-- Jar body -->
        <path d="M 488 748 L 488 1080 L 732 1080 L 732 748 Z"/>
        <!-- Label box -->
        <rect x="525" y="830" width="170" height="120" rx="4"/>
        <!-- label text lines -->
        <line x1="545" y1="860" x2="675" y2="860" stroke-width="3"/>
        <line x1="545" y1="885" x2="640" y2="885" stroke-width="2" opacity="0.7"/>
        <line x1="545" y1="910" x2="660" y2="910" stroke-width="2" opacity="0.7"/>
        <line x1="545" y1="935" x2="620" y2="935" stroke-width="2" opacity="0.5"/>
      </g>
      <!-- jar shadow side -->
      <rect x="700" y="748" width="32" height="332" fill="url(#hatch)" filter="url(#pencil)" opacity="0.7"/>
      <!-- powder spilling out front -->
      <path d="M 540 1078 Q 580 1060 620 1078 Q 660 1095 700 1078 L 720 1090 L 510 1090 Z" fill="url(#dotsPowder)" stroke="#1c1917" stroke-width="2" filter="url(#pencil)"/>
      <!-- scoop -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2.2" fill="none">
        <path d="M 610 1010 L 610 1050 Q 610 1075 640 1075 Q 670 1075 670 1050 L 670 1010 Z"/>
        <line x1="610" y1="1018" x2="670" y2="1018"/>
        <line x1="640" y1="1010" x2="640" y2="945"/>
        <circle cx="640" cy="940" r="10"/>
      </g>

      <!-- RIGHT: Tall glass bottle with cork (omega 3 cod liver oil) -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2.4" fill="none">
        <!-- Cork -->
        <rect x="800" y="490" width="70" height="70" rx="3"/>
        <line x1="800" y1="520" x2="870" y2="520" opacity="0.4"/>
        <!-- Neck -->
        <path d="M 808 560 L 808 600 L 800 615 L 870 615 L 862 600 L 862 560 Z"/>
        <!-- Bottle body -->
        <path d="M 770 615 Q 770 660 790 680 L 790 1060 Q 790 1080 810 1080 L 860 1080 Q 880 1080 880 1060 L 880 680 Q 900 660 900 615 Z"/>
        <!-- liquid level -->
        <path d="M 790 740 Q 835 730 880 740 L 880 1060 Q 880 1080 860 1080 L 810 1080 Q 790 1080 790 1060 Z"/>
        <!-- highlight -->
        <line x1="810" y1="700" x2="810" y2="1050" opacity="0.4"/>
      </g>
      <path d="M 790 740 Q 835 730 880 740 L 880 1060 Q 880 1080 860 1080 L 810 1080 Q 790 1080 790 1060 Z" fill="url(#hatch)" filter="url(#pencil)" opacity="0.7"/>

      <!-- RIGHT: leaves / botanical accent (algae omega) -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2" fill="none">
        <path d="M 900 950 Q 940 920 970 950 Q 940 980 900 950 Z"/>
        <line x1="905" y1="950" x2="965" y2="950" stroke-width="1.2" opacity="0.5"/>
        <path d="M 920 1000 Q 950 980 975 1010 Q 950 1030 920 1000 Z"/>
        <line x1="922" y1="1003" x2="970" y2="1010" stroke-width="1.2" opacity="0.5"/>
      </g>

      <!-- BOTTOM: scattered tablets -->
      <g filter="url(#pencil)" stroke="#1c1917" stroke-width="2" fill="#fafaf9">
        <ellipse cx="220" cy="1110" rx="20" ry="7"/>
        <ellipse cx="270" cy="1118" rx="18" ry="6"/>
        <ellipse cx="330" cy="1112" rx="22" ry="7"/>
        <line x1="200" y1="1110" x2="240" y2="1110" stroke-width="1" opacity="0.6"/>
        <line x1="252" y1="1118" x2="288" y2="1118" stroke-width="1" opacity="0.6"/>
      </g>

      <!-- shadows on counter -->
      <ellipse cx="240" cy="1085" rx="90" ry="6" fill="#1c1917" opacity="0.18" filter="url(#pencil)"/>
      <ellipse cx="610" cy="1085" rx="130" ry="7" fill="#1c1917" opacity="0.18" filter="url(#pencil)"/>
      <ellipse cx="835" cy="1085" rx="65" ry="5" fill="#1c1917" opacity="0.18" filter="url(#pencil)"/>
    </svg>

    <div class="top-overlay">
      <div class="headline-tag">2026 Guide</div>
      <h1>Supplements<br>and <span class="accent">Microplastics</span></h1>
    </div>
    <div class="footer">
      <span class="footer-stat">Cleanest forms ranked</span>
      <span class="footer-url">plasticdetox.org</span>
    </div>
  </div>
</body>
</html>
