<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Glyphosate Detox Article Hero</title>
  <style>
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 100 900;
      src: url(inter-latin.woff2) format('woff2');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #d6d3d1; display: flex; justify-content: center; padding: 2rem; font-family: 'Inter', -apple-system, sans-serif; }
    .pin {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      background: #fafaf9;
    }
    .pin > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .top-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 60px 50px 110px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0.97) 0%,
        rgba(250, 250, 249, 0.90) 55%,
        rgba(250, 250, 249, 0) 100%
      );
      text-align: center;
    }
    .headline-tag {
      display: inline-block;
      font-size: 17px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #fff;
      background: #7c3aed;
      padding: 10px 26px;
      border-radius: 100px;
      margin-bottom: 24px;
    }
    .top-overlay h1 {
      font-size: 76px;
      font-weight: 900;
      color: #1c1917;
      line-height: 1.0;
      letter-spacing: -0.035em;
    }
    .top-overlay h1 .accent { color: #7c3aed; font-style: italic; }
    .footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px;
      background: linear-gradient(to bottom,
        rgba(250, 250, 249, 0) 0%,
        rgba(250, 250, 249, 0.92) 55%,
        rgba(250, 250, 249, 1) 100%
      );
    }
    .footer-stat { font-size: 18px; font-weight: 600; color: #78716c; }
    .footer-url { font-size: 22px; font-weight: 900; color: #7c3aed; }
  </style>
</head>
<body>
  <div class="pin">
    <img src="glyphosate.png" alt="Pencil sketch of a kitchen counter with oats, wheat bread, dried chickpeas, lentils, beans, and cooking oil">
    <div class="top-overlay">
      <div class="headline-tag">Food &amp; Pesticides &middot; 2026 Guide</div>
      <h1>The Complete Guide<br>to <span class="accent">Glyphosate</span><br>Detox</h1>
    </div>
    <div class="footer">
      <span class="footer-stat">80% of Americans test positive. Here is how to stop.</span>
      <span class="footer-url">plasticdetox.org</span>
    </div>
  </div>
</body>
</html>
